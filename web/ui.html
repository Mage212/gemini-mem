<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antigravity Memory Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    header { padding: 16px 20px; background: linear-gradient(120deg, #0ea5e9, #6366f1); color: #0b1224; font-weight: 700; }
    main { padding: 20px; max-width: 1100px; margin: 0 auto; }
    section { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
    h2 { margin: 0 0 10px; font-size: 18px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .card { flex: 1 1 240px; background: #0b1224; border: 1px solid #1f2937; border-radius: 10px; padding: 12px; }
    button { background: #2563eb; color: #e2e8f0; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-weight: 600; }
    button:hover { background: #1d4ed8; }
    input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #1f2937; background: #0f172a; color: #e2e8f0; margin-bottom: 8px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0b1224; border: 1px solid #1f2937; border-radius: 10px; padding: 12px; color: #cbd5e1; }
    .muted { color: #94a3b8; font-size: 12px; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #1d4ed8; color: #e2e8f0; font-size: 12px; margin-right: 6px; }
  </style>
</head>
<body>
  <header>Antigravity Memory Dashboard</header>
  <main>
    <section>
      <h2>Project</h2>
      <input id="project" placeholder="/absolute/path/to/project" />
      <button onclick="loadAll()">Load</button>
      <div id="status" class="muted" style="margin-top:8px;"></div>
    </section>

    <section>
      <h2>Sessions</h2>
      <div class="row" id="sessions"></div>
    </section>

    <section>
      <h2>Context</h2>
      <button onclick="fetchContext()">Refresh Context</button>
      <pre id="context">No data.</pre>
    </section>

    <section>
      <h2>Stats</h2>
      <div class="row" id="stats"></div>
    </section>
  </main>

<script>
const api = (path) => `${window.location.origin}${path}`;

async function loadAll() {
  const project = document.getElementById('project').value.trim();
  if (!project) { alert('Enter project path'); return; }
  document.getElementById('status').textContent = 'Loading...';
  await Promise.all([fetchSessions(project), fetchContext(), fetchStats()]);
  document.getElementById('status').textContent = 'Loaded';
}

async function fetchSessions(project) {
  try {
    const res = await fetch(api(`/session/list?project=${encodeURIComponent(project)}&limit=10`));
    const data = await res.json();
    const container = document.getElementById('sessions');
    container.innerHTML = '';
    const addCard = (title, s) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<div class="badge">${s.status}</div><div>${title}</div><div class="muted">${s.id}</div><div class="muted">Obs: ${s.total_observations || 0}</div><div class="muted">Summary: ${(s.summary || '').slice(0,80) || 'None'}</div>`;
      container.appendChild(div);
    };
    if (data.active) addCard('Active session', data.active);
    (data.recent || []).forEach((s) => addCard('Recent session', s));
  } catch (e) {
    console.error(e);
  }
}

async function fetchContext() {
  const project = document.getElementById('project').value.trim();
  if (!project) return;
  const res = await fetch(api(`/context?project=${encodeURIComponent(project)}&prompt=`));
  const text = await res.text();
  document.getElementById('context').textContent = text;
}

async function fetchStats() {
  try {
    const res = await fetch(api('/stats'));
    const data = await res.json();
    const container = document.getElementById('stats');
    container.innerHTML = '';
    const entries = [
      ['Sessions', data.sessions],
      ['Observations', data.observations],
      ['Compressed', data.compressed],
      ['Notes', data.notes],
      ['Tokens Saved', data.tokensSaved?.toLocaleString?.() || data.tokensSaved],
      ['Avg Compression %', data.averageCompressionPct]
    ];
    entries.forEach(([label, val]) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<div class="muted">${label}</div><div style="font-size:20px;font-weight:700;">${val ?? '-'}</div>`;
      container.appendChild(div);
    });
  } catch (e) {
    console.error(e);
  }
}
</script>
</body>
</html>
